name: Release

# Triggered by tags of the form `v0.1.0`, `v0.1.1`, `v0.2.0`, …
# (not `v1.0.0-rc.1` unless the matcher is widened).
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io + GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Re-run the core test suite — CI already ran on the tagged
      # commit's push, but a tag push can arrive separately (e.g.
      # created from the web UI). Cheap insurance against shipping
      # broken code.
      - name: Verify tests pass (including slow sweeps)
        run: cargo test -p mfsk-core --features full --release -- --include-ignored

      # The tag version must match Cargo.toml's version field. Fail
      # fast if someone tags `v0.2.0` while Cargo.toml still says
      # `0.1.0`.
      - name: Check tag matches Cargo.toml version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }' mfsk-core/Cargo.toml)
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mfsk-core

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Published to crates.io as [`mfsk-core ${{ github.ref_name }}`](https://crates.io/crates/mfsk-core).

            Release notes are auto-generated from merged PRs; see the crate's
            [CHANGELOG.md](https://github.com/jl1nie/mfsk-core/blob/main/CHANGELOG.md)
            for curated release notes.
